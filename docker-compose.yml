version: "3.9"

services:
  db:
    image: postgres:16
    container_name: morabilidade_db
    environment:
      POSTGRES_DB: morabilidade
      POSTGRES_USER: morabilidade
      POSTGRES_PASSWORD: morabilidade123
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morabilidade"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: morabilidade_backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: morabilidade_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/static:/app/static
    depends_on:
      - backend

volumes:
  pg_data:
