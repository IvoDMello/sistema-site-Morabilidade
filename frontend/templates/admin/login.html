<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login — Morabilidade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white rounded-xl shadow p-10 w-full max-w-sm" x-data="loginForm()">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Morabilidade</h1>
    <form @submit.prevent="entrar" class="space-y-4">
      <div>
        <label class="text-sm text-gray-600">E-mail</label>
        <input x-model="email" type="email" required class="w-full border rounded px-3 py-2 mt-1" />
      </div>
      <div>
        <label class="text-sm text-gray-600">Senha</label>
        <input x-model="senha" type="password" required class="w-full border rounded px-3 py-2 mt-1" />
      </div>
      <button class="w-full bg-blue-700 text-white py-2 rounded font-semibold hover:bg-blue-800">Entrar</button>
      <p x-show="erro" class="text-red-500 text-sm text-center" x-text="erro"></p>
    </form>
  </div>

  <script>
  function loginForm() {
    return {
      email: '',
      senha: '',
      erro: '',
      async entrar() {
        this.erro = '';
        const form = new URLSearchParams();
        form.append('username', this.email);
        form.append('password', this.senha);
        const resp = await fetch('/api/v1/usuarios/token', { method: 'POST', body: form });
        if (resp.ok) {
          const data = await resp.json();
          localStorage.setItem('token', data.access_token);
          window.location.href = '/admin';
        } else {
          this.erro = 'E-mail ou senha incorretos.';
        }
      }
    }
  }
  </script>
</body>
</html>
