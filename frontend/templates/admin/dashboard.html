{% extends "admin/base.html" %}
{% block title %}Dashboard — Admin{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-8">Dashboard</h1>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10" x-data="dashboard()">
  <div class="bg-white rounded-xl shadow p-6">
    <p class="text-sm text-gray-500">Total de Imóveis</p>
    <p class="text-3xl font-bold text-blue-700 mt-1" x-text="resumo.imoveis?.total ?? '—'"></p>
  </div>
  <div class="bg-white rounded-xl shadow p-6">
    <p class="text-sm text-gray-500">Disponíveis</p>
    <p class="text-3xl font-bold text-green-600 mt-1" x-text="resumo.imoveis?.por_status?.disponivel ?? 0"></p>
  </div>
  <div class="bg-white rounded-xl shadow p-6">
    <p class="text-sm text-gray-500">Total de Leads</p>
    <p class="text-3xl font-bold text-purple-600 mt-1" x-text="resumo.leads?.total ?? '—'"></p>
  </div>
  <div class="bg-white rounded-xl shadow p-6">
    <p class="text-sm text-gray-500">Leads Novos</p>
    <p class="text-3xl font-bold text-yellow-500 mt-1" x-text="resumo.leads?.novos ?? 0"></p>
  </div>
</div>

<div class="bg-white rounded-xl shadow p-6">
  <h2 class="font-bold mb-4">Acesso rápido</h2>
  <div class="flex flex-wrap gap-3">
    <a href="/admin/imoveis/novo" class="bg-blue-700 text-white px-4 py-2 rounded text-sm font-semibold">+ Novo imóvel</a>
    <a href="/admin/proprietarios/novo" class="bg-gray-700 text-white px-4 py-2 rounded text-sm font-semibold">+ Proprietário</a>
    <a href="/admin/clientes/leads" class="bg-purple-700 text-white px-4 py-2 rounded text-sm font-semibold">Ver leads</a>
  </div>
</div>
{% endblock %}
